<!doctype html><html><head><meta charset="UTF-8"/><title>Email Generator</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><section style="font-family:Segoe UI,Arial;padding:12px"><h2 style="margin:0 0 10px 0">Email Generator</h2><div style="height:10px"></div><label>Template</label> <select id="templateSelect" style="width:100%;padding:6px" title="Template Selector"><option value="acknowledgement">Acknowledgement</option><option value="courseSwap">Course Swap</option><option value="courseSwapCompleted">Course Swap Completed</option><option value="furtherAttention">Issue Requires Further Attention</option><option value="iPasswordReset">iSIMS Password Reset</option><option value="issueResolved">Issue Resolved</option><option value="iUnlock">iSIMS Account Unlock</option><option value="loanDevice">Loan Device</option><option value="loanDeviceAck">Loan Device Acknowledgement</option><option value="MFA">Phone MFA</option><option value="missingGrade">Missing Grade</option><option value="paSystem">PA System Setup</option><option value="paSystemCompleted">PA System Setup Completed</option><option value="postTrainingCompleted">Post-Training Completed</option><option value="trainingRequest">Training Request</option><option value="vPasswordReset">VTDI Password Reset</option><option value="vUnlock">VTDI Account Unlock</option></select><div style="height:10px"></div><label>Recipient (To)</label><br/><input id="toEmail" placeholder="Jane_Brown@vtdi.edu.jm" style="width:100%;padding:6px"/> <label>Recipient (CC)</label><br/><input id="toCC" placeholder="Jane_Brown@vtdi.edu.jm" style="width:100%;padding:6px"/><div style="height:10px"></div><label>Client/Name</label><br/><input id="clientName" placeholder="Jane Brown" style="width:100%;padding:6px"/><div style="height:10px"></div><label>Reference #</label><br/><input id="refNo" placeholder="12345" style="width:100%;padding:6px"/><div style="height:10px"></div><label>Details</label><br/><textarea id="details" rows="5" placeholder="Write the key details here..." style="width:100%;padding:6px"></textarea><div style="height:12px"></div><button id="generateBtn" style="width:100%;padding:10px;cursor:pointer">Generate Email</button><p id="status" style="margin-top:10px;font-size:12px"></p></section><script src="https://davidlynchict.github.io/mailgenerator/taskpane.js"></script></body><script>Office.onReady(function(){document.body.style.background="lightgreen",console.log("Office Ready")})</script></html>
